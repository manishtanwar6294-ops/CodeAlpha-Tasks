<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container{
            width: 420px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
        }

        /* Header */

        .header{
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 15px;
            background: linear-gradient(to right, #ff512f, #dd2476);
            color: white;
        }

        .header h1{
            font-size: 32px;
            margin-bottom: 5px;
        }

        .header p{
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Display */

        #display{
            width: 100%;
            height: 70px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: #f1f1f1;
            text-align: right;
            padding: 15px;
            font-size: 30px;
            margin-bottom: 20px;
        }

        /* Buttons */

        .buttons{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button{
            height: 60px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover{
            transform: scale(1.05);
        }

        button:active{
            transform: scale(0.95);
        }

        /* Different Button Colors */

        .number{
            background: #f1f1f1;
        }

        .operator{
            background: #667eea;
            color: white;
        }

        .equal{
            background: #28a745;
            color: white;
        }

        .clear{
            background: #dc3545;
            color: white;
        }

        .special{
            background: #ff9800;
            color: white;
        }

    </style>
</head>

<body>

    <div class="container">

        <!-- Header -->

        <div class="header">
            <h1> Basic Calculator</h1>
            <p>HTML • CSS • JavaScript</p>
        </div>

        <!-- Display -->

        <input type="text" id="display" readonly>

        <!-- Buttons -->

        <div class="buttons">

            <!-- Row 1 -->

            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="special" onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">÷</button>
            <button class="special" onclick="appendValue('Math.sqrt(')">√</button>

            <!-- Row 2 -->

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            <button class="special" onclick="appendValue('**2')">x²</button>

            <!-- Row 3 -->

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">−</button>
            <button class="special" onclick="appendValue('3.14')">π</button>

            <!-- Row 4 -->

            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            <button class="special" onclick="appendValue('/100')">%</button>

            <!-- Row 5 -->

            <button class="number" onclick="appendValue('0')">0</button>
            <button class="number" onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculateResult()">=</button>
            <button class="special" onclick="convertMeter()">m</button>
            <button class="special" onclick="convertGram()">g</button>

        </div>

    </div>

    <script>

        let display = document.getElementById("display");

        // Add Value

        function appendValue(value){
            display.value += value;
        }

        // Clear Screen

        function clearDisplay(){
            display.value = "";
        }

        // Delete Last Character

        function deleteLast(){
            display.value = display.value.slice(0, -1);
        }

        // Calculate

        function calculateResult(){

            try{
                display.value = eval(display.value);
            }
            catch{
                display.value = "Error";
            }

        }

        // Meter Conversion

        function convertMeter(){

            let value = prompt("Enter value in Meter:");

            if(value !== null){
                display.value = value + " meter";
            }

        }

        // Gram Conversion

        function convertGram(){

            let value = prompt("Enter value in Gram:");

            if(value !== null){
                display.value = value + " gram";
            }

        }

        // Keyboard Support

        document.addEventListener("keydown", function(event){

            const key = event.key;

            if(
                (key >= '0' && key <= '9') ||
                key === '+' ||
                key === '-' ||
                key === '*' ||
                key === '/' ||
                key === '.' ||
                key === '%'
            ){
                appendValue(key);
            }

            else if(key === "Enter"){
                calculateResult();
            }

            else if(key === "Backspace"){
                deleteLast();
            }

            else if(key === "Escape"){
                clearDisplay();
            }

        });

    </script>

</body>
</html>
